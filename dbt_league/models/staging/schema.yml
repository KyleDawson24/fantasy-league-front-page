version: 2

models:
  - name: stg_box_scores
    description: 'One row per player per team per scoring period, flattened from raw ESPN box score JSON.'
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - season_year
              - player_id
              - scoring_period
              - team_id
    columns:
      - name: season_year
        description: 'Year of MLB season.'
        tests:
          - not_null
      - name: scoring_period
        description: 'Daily ESPN scoring period number.'
        tests:
          - not_null
      - name: matchup_period
        description: 'The weekly matchup period this scoring period belongs to.'
      - name: team_name
        description: 'ESPN fantasy team name.'
      - name: team_id
        description: 'ESPN stable numeric team identifier.'
        tests:
          - not_null
      - name: owner_name
        description: 'Team owner display name, extracted from ESPN API. For co-managed teams, a slash-delimited list of first names.'
      - name: home_away
        description: 'Whether this player was on the home or away side of the matchup.'
      - name: player_name
        description: 'Player full name as returned by ESPN.'
      - name: player_id
        description: 'ESPN stable numeric player identifier.'
        tests:
          - not_null
      - name: position
        description: 'Player MLB position as reported by ESPN (e.g. SP, RP, 1B, DH).'
      - name: lineup_slot
        description: 'The fantasy lineup slot this player occupied. Active slots are positions; BE = bench, IL = injured list.'
      - name: pro_team
        description: 'Player MLB team abbreviation.'
      - name: points
        description: 'Pre-computed fantasy points for this player on this scoring period, calculated by ESPN using league scoring settings.'
      - name: breakdown
        description: 'Raw stat breakdown dict from ESPN. Keys are stat abbreviations (HR, RBI, K, etc). Used for Phase 3 stat-level records.'
      - name: games_played
        description: 'Number of MLB games this player appeared in on this scoring period. 0 = did not play, 1 = single game, 2 = both halves of a doubleheader. Phase 3.3: extracted from raw mRoster on DH days (sums per-game splits the wrapper would otherwise overwrite). For pre-Phase-3.3 rows, defaults to 1 if breakdown is non-empty else 0.'
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1, 2]
      - name: display_name
        description: 'COALESCE of player_nicknames.nickname and player_name. Phase 3.1: nickname join moved here from individual marts so display_name propagates through every downstream model.'

  - name: stg_player_stat_breakdowns
    description: >
      One row per (season, scoring_period, team, player, stat_name) -- the breakdown
      VARIANT flattened into relational shape. No business filters applied here;
      staging stays a pure reshape. Business filters (active slots, counting stats)
      are applied in int_player_daily_stats. Bench/IL rows are preserved so future
      models (e.g. wasted-points analysis in Phase 4) can consume the same staging.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - season_year
              - scoring_period
              - team_id
              - player_id
              - stat_name
    columns:
      - name: season_year
        description: 'Year of MLB season.'
        tests:
          - not_null
      - name: scoring_period
        description: 'Daily ESPN scoring period number.'
        tests:
          - not_null
      - name: matchup_period
        description: 'The weekly matchup period this scoring period belongs to.'
      - name: team_id
        description: 'ESPN stable numeric team identifier.'
        tests:
          - not_null
      - name: team_name
        description: 'ESPN fantasy team name.'
      - name: owner_name
        description: 'Team owner display name.'
      - name: player_id
        description: 'ESPN stable numeric player identifier.'
        tests:
          - not_null
      - name: player_name
        description: 'Player full name as returned by ESPN.'
      - name: position
        description: 'Player MLB position.'
      - name: lineup_slot
        description: 'Fantasy lineup slot on this scoring period. Preserved so downstream models can filter active/bench/IL.'
      - name: stat_name
        description: 'Stat abbreviation as a key in the breakdown VARIANT (HR, RBI, K, etc).'
        tests:
          - not_null
          - relationships:
              to: ref('stat_classification')
              field: stat_name
      - name: stat_value
        description: 'Numeric value of the stat for this player on this scoring period.'
        tests:
          - not_null

  - name: stg_scoring_settings
    description: >
      Reshape raw scoring settings into one row per scored stat. Surfaces only
      the CURRENT season's weights (max season_year with data); historical
      settings remain preserved in RAW.SCORING_SETTINGS but are not surfaced
      here. The current season's weights are applied universally — including
      to historical stat breakdowns — so cross-season scores are comparable
      under a common scale. When multiple extractions exist for the same
      season, picks the most recent via ROW_NUMBER() on extracted_at.
      Grain: one row per stat_name (no season_year dimension; this is a
      single-season reference table).
    columns:
      - name: settings_season
        description: 'Season year these weights came from (always the latest loaded). Carried through for traceability.'
      - name: espn_stat_id
        description: 'ESPN internal numeric stat ID. Bridges raw API to seed-defined stat names.'
      - name: stat_name
        description: 'Human-readable stat abbreviation (HR, RBI, K, etc.) joined from stat_classification on espn_stat_id.'
      - name: stat_category
        description: 'hitting, pitching, fielding, or unknown — passed through from stat_classification.'
      - name: points_per_unit
        description: 'Fantasy points awarded per unit of this stat under the current season''s scoring rules.'