version: 2

models:
  - name: stg_box_scores
    description: "One row per player per scoring period, flattened from raw ESPN box score JSON."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - season_year
              - player_id
              - scoring_period
              - team_id
    columns:
      - name: player_id
        description: "ESPN's unique player identifier."
        tests:
          - not_null
      - name: scoring_period
        description: "Daily ESPN scoring period number."
        tests:
          - not_null
      - name: team_id
        description: "ESPN's unique team identifier."
        tests:
          - not_null    
      - name: season_year
        description: "Year of MLB season"
        tests:
          - not_null