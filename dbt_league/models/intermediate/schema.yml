version: 2

models:
  - name: int_team_daily_scores
    description: >
      Team-level daily scoring aggregates with hitting/pitching splits.
      Active players only (bench and IL excluded). Intermediate grain
      between player-level staging and the weekly mart. One row per
      team per scoring period.
    columns:
      - name: season_year
        description: 'ESPN season year. Required for cross-season grain integrity.'
      - name: scoring_period
        description: 'Daily ESPN scoring period number. Scoring period 1 = opening day of the season.'
      - name: matchup_period
        description: 'The weekly matchup period this scoring period belongs to. Used for rollup to weekly grain.'
      - name: team_name
        description: 'ESPN fantasy team name. Joins to team_id for stable references.'
      - name: team_id
        description: 'ESPN stable numeric team identifier. Prefer over team_name for joins.'
      - name: owner_name
        description: 'Team owner display name. Passed through from staging.'
      - name: total_points
        description: 'Sum of all active player points for this team on this scoring period.'
      - name: hitting_points
        description: 'Points from non-pitcher lineup slots (all slots except SP/RP/P) on this scoring period.'
      - name: pitching_points
        description: 'Points from SP, RP, and P lineup slots on this scoring period.'
      - name: active_player_count
        description: 'Number of players in active lineup slots for this team on this scoring period.'

  - name: int_player_daily_scores
    description: >
      Player-level daily scores for active lineup slots only (bench and IL excluded).
      Classifies each player-day as hitting or pitching based on lineup slot.
      Two-way players (e.g. Ohtani) may appear in both categories across different
      scoring periods, or on the same day if ESPN splits their hitting and pitching
      into separate lineup slots. One row per player per team per scoring period.
    columns:
      - name: season_year
        description: 'ESPN season year.'
      - name: scoring_period
        description: 'Daily ESPN scoring period number.'
      - name: matchup_period
        description: 'The weekly matchup period this scoring period belongs to.'
      - name: team_name
        description: 'ESPN fantasy team name.'
      - name: team_id
        description: 'ESPN stable numeric team identifier.'
      - name: owner_name
        description: 'Team owner display name. Passed through from staging.'
      - name: player_name
        description: 'Player full name as returned by ESPN. Subject to change; use player_id for stable references.'
      - name: player_id
        description: 'ESPN stable numeric player identifier. Use this for joins, including to the player_nicknames seed.'
      - name: position
        description: 'Player MLB position as reported by ESPN. Passed through for reference but not used for classification — lineup_slot determines player_type.'
      - name: lineup_slot
        description: 'The fantasy lineup slot this player occupied. Determines player_type classification. Retained at daily grain for slot-level analysis.'
      - name: pro_team
        description: 'Player MLB team abbreviation.'
      - name: total_points_typed
        description: 'Pre-computed fantasy points for this player-day. Renamed from points to distinguish from the aggregated total_points in the weekly mart.'
      - name: player_type
        description: 'Derived classification based on lineup_slot: pitching for SP/RP/P slots, hitting for all others. Consumed by the weekly mart CASE WHEN to produce hitting_points and pitching_points columns.'

  - name: int_player_daily_stats
    description: >
      Slot-agnostic player-daily stat detail. Joins stat_classification to
      bring in stat_category and filters to is_counting=true (rates dropped
      since they cannot be summed; recomputed via macros at the fact layer
      where slot filter has been applied). Long format. lineup_slot
      preserved so downstream models can produce active variants
      (fct_weekly_player_stats) and inactive variants (future
      mart_wasted_points) from the same intermediate.
      Grain: (season_year, matchup_period, scoring_period, team_id, player_id, lineup_slot, stat_name).
    columns:
      - name: season_year
        description: 'ESPN season year.'
      - name: matchup_period
        description: 'ESPN matchup period number.'
      - name: scoring_period
        description: 'Daily ESPN scoring period number.'
      - name: team_id
        description: 'ESPN stable numeric team identifier.'
      - name: team_name
        description: 'ESPN fantasy team name.'
      - name: owner_name
        description: 'Team owner display name.'
      - name: player_id
        description: 'ESPN stable numeric player identifier.'
      - name: player_name
        description: 'Player full name.'
      - name: lineup_slot
        description: 'Fantasy lineup slot occupied on this day. Active slots = positions; BE/IL/FA = inactive. Preserved so downstream filters can split active vs inactive paths.'
      - name: stat_name
        description: 'Stat abbreviation, filtered to is_counting=true.'
      - name: stat_category
        description: 'hitting, pitching, or fielding, from stat_classification.'
      - name: stat_value
        description: 'Numeric stat value for this player on this day.'

  - name: int_player_weekly_stats
    description: >
      Wide pivot of counting stats from int_player_daily_stats. lineup_slot
      preserved as a grain dimension so the fact layer can filter by slot
      and aggregate slot dimension away post-filter. A player who occupied
      multiple slots within a matchup_period produces multiple rows here.
      Counting columns only at this grain -- rates are computed at the fact
      layer because meaningful rates require the slot filter applied first.
      Grain: (season_year, matchup_period, team_id, player_id, lineup_slot).
    columns:
      - name: season_year
        description: 'ESPN season year.'
      - name: matchup_period
        description: 'ESPN matchup period number.'
      - name: team_id
        description: 'ESPN stable numeric team identifier.'
      - name: team_name
        description: 'ESPN fantasy team name.'
      - name: owner_name
        description: 'Team owner display name.'
      - name: player_id
        description: 'ESPN stable numeric player identifier.'
      - name: player_name
        description: 'Player full name.'
      - name: lineup_slot
        description: 'Fantasy lineup slot. Preserved as grain dimension; downstream facts filter and collapse.'
      - name: h
        description: 'Hits (sum across scoring periods within this slot).'
      - name: ab
        description: 'At bats.'
      - name: b_bb
        description: 'Batter walks.'
      - name: b_so
        description: 'Batter strikeouts.'
      - name: hbp
        description: 'Hit by pitch.'
      - name: sf
        description: 'Sacrifice flies.'
      - name: hr
        description: 'Home runs.'
      - name: r
        description: 'Runs.'
      - name: rbi
        description: 'Runs batted in.'
      - name: sb
        description: 'Stolen bases.'
      - name: cs
        description: 'Caught stealing.'
      - name: tb
        description: 'Total bases.'
      - name: singles
        description: 'Singles (1B in seed).'
      - name: doubles
        description: 'Doubles (2B in seed).'
      - name: triples
        description: 'Triples (3B in seed).'
      - name: xbh
        description: 'Extra-base hits.'
      - name: w
        description: 'Pitcher wins.'
      - name: l
        description: 'Pitcher losses.'
      - name: k
        description: 'Pitcher strikeouts.'
      - name: er
        description: 'Earned runs allowed.'
      - name: outs
        description: 'Outs recorded. Innings pitched = outs / 3.'
      - name: qs
        description: 'Quality starts.'
      - name: sv
        description: 'Saves.'
      - name: hld
        description: 'Holds.'
      - name: p_h
        description: 'Hits allowed.'
      - name: p_bb
        description: 'Walks allowed.'
      - name: p_hr
        description: 'Home runs allowed.'
      - name: p_r
        description: 'Runs allowed.'
      - name: cg
        description: 'Complete games.'
      - name: blk
        description: 'Balks.'
      - name: wp
        description: 'Wild pitches.'