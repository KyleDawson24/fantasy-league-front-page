version: 2

models:
  - name: fct_weekly_player_scores
    description: 'One row per player per team per matchup period. Splits points into hitting and pitching components. Two-way players get a single row with both contributions reflected. Nickname resolution via player_nicknames seed (still applied here for backwards compatibility; Phase 3.1 also propagates display_name from stg_box_scores).'
    columns:
      - name: season_year
        description: 'ESPN season year.'
      - name: matchup_period
        description: 'ESPN matchup period number within the season.'
      - name: team_name
        description: 'ESPN fantasy team name.'
      - name: team_id
        description: 'ESPN stable numeric team identifier.'
      - name: player_name
        description: 'Player full name as returned by ESPN.'
      - name: player_id
        description: 'ESPN stable numeric player identifier.'
      - name: position
        description: 'Player MLB position. Passed through for reference.'
      - name: hitting_points
        description: 'Points earned from hitting lineup slots (all slots except SP/RP/P) during this matchup period.'
      - name: pitching_points
        description: 'Points earned from pitching lineup slots (SP/RP/P) during this matchup period.'
      - name: total_points
        description: 'Sum of hitting_points and pitching_points. For single-role players, equals whichever is nonzero. For two-way players, the combined total.'
        tests:
          - not_null
      - name: days_active
        description: 'Count of distinct scoring periods this player appeared in an active lineup slot.'
      - name: display_name
        description: 'COALESCE of player_nicknames.nickname and player_name. Used by the output script for contributor callouts.'

  - name: fct_weekly_player_performance
    description: >
      Wide-format player-weekly convergence fact. The consumer-facing entity
      for "what did this player do this week" -- counting stats, per-stat
      point contributions, rate stats, and fantasy scoring totals all in one
      row per player per matchup. Phase 3.2: per-stat *_pts columns and
      calculated_* totals added so consumers can answer "top N stats by
      point contribution" and cross-season normalization questions.
      Pipeline: read int_player_weekly_performance (slot-preserved counting
      + pts), filter to active slots, aggregate across slots, compute rates
      via shared macros, sum *_pts into calculated_* totals, join
      fct_weekly_player_scores for platform total/hitting/pitching points.
      Incremental fact -- merge by unique_key.
      Grain: (season_year, matchup_period, team_id, player_id).
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - season_year
              - matchup_period
              - team_id
              - player_id
    columns:
      - name: season_year
        description: 'ESPN season year.'
        tests:
          - not_null
      - name: matchup_period
        description: 'ESPN matchup period number.'
        tests:
          - not_null
      - name: team_id
        description: 'ESPN stable numeric team identifier.'
        tests:
          - not_null
      - name: team_name
        description: 'ESPN fantasy team name.'
      - name: owner_name
        description: 'Team owner display name.'
      - name: player_id
        description: 'ESPN stable numeric player identifier.'
        tests:
          - not_null
      - name: player_name
        description: 'Player full name as returned by ESPN.'
      - name: display_name
        description: 'COALESCE(nickname, player_name). Used by the output script for contributor callouts.'
      - name: h
        description: 'Hits.'
      - name: ab
        description: 'At bats.'
      - name: b_bb
        description: 'Batter walks.'
      - name: b_so
        description: 'Batter strikeouts.'
      - name: hbp
        description: 'Hit by pitch.'
      - name: sf
        description: 'Sacrifice flies.'
      - name: hr
        description: 'Home runs.'
      - name: r
        description: 'Runs.'
      - name: rbi
        description: 'Runs batted in.'
      - name: sb
        description: 'Stolen bases.'
      - name: cs
        description: 'Caught stealing.'
      - name: tb
        description: 'Total bases.'
      - name: singles
        description: 'Singles (1B in seed). Renamed for SQL compatibility.'
      - name: doubles
        description: 'Doubles (2B in seed).'
      - name: triples
        description: 'Triples (3B in seed).'
      - name: xbh
        description: 'Extra-base hits.'
      - name: w
        description: 'Pitcher wins.'
      - name: l
        description: 'Pitcher losses.'
      - name: k
        description: 'Pitcher strikeouts.'
      - name: er
        description: 'Earned runs allowed.'
      - name: outs
        description: 'Outs recorded. Innings pitched = outs / 3.'
      - name: qs
        description: 'Quality starts.'
      - name: sv
        description: 'Saves.'
      - name: hld
        description: 'Holds.'
      - name: p_h
        description: 'Hits allowed.'
      - name: p_bb
        description: 'Walks allowed.'
      - name: p_hr
        description: 'Home runs allowed.'
      - name: p_r
        description: 'Runs allowed.'
      - name: cg
        description: 'Complete games.'
      - name: blk
        description: 'Balks.'
      - name: wp
        description: 'Wild pitches.'
      - name: avg
        description: 'Batting average (H / AB). NULL when AB = 0.'
      - name: obp
        description: 'On-base percentage. NULL when denominator = 0.'
      - name: slg
        description: 'Slugging percentage (TB / AB). NULL when AB = 0.'
      - name: ops
        description: 'On-base plus slugging.'
      - name: era
        description: 'Earned run average. NULL when OUTS = 0.'
      - name: whip
        description: 'Walks + hits per inning pitched.'
      - name: k_per_9
        description: 'Strikeouts per 9 innings.'
      - name: k_per_bb
        description: 'Strikeout-to-walk ratio.'
      - name: platform_points
        description: 'Platform-computed fantasy total points (from fct_weekly_player_scores). Sum of platform_hitting_pts + platform_pitching_pts. The official ESPN-computed value; the arbiter for W/L outcomes. Renamed from total_points in Phase 3.2 to disambiguate from calculated_points (the rules-normalized derivation).'
      - name: platform_hitting_pts
        description: 'Platform-computed fantasy points from hitting lineup slots. Renamed from hitting_points in Phase 3.2.'
      - name: platform_pitching_pts
        description: 'Platform-computed fantasy points from pitching lineup slots. Renamed from pitching_points in Phase 3.2.'

      # Phase 3.2: per-stat point contributions
      - name: h_pts
        description: 'Fantasy points generated by hits (h * points_per_unit for H).'
      - name: ab_pts
        description: 'Fantasy points generated by at bats.'
      - name: b_bb_pts
        description: 'Fantasy points generated by batter walks.'
      - name: b_so_pts
        description: 'Fantasy points generated by batter strikeouts.'
      - name: hbp_pts
        description: 'Fantasy points generated by hit-by-pitch.'
      - name: sf_pts
        description: 'Fantasy points generated by sacrifice flies.'
      - name: hr_pts
        description: 'Fantasy points generated by home runs.'
      - name: r_pts
        description: 'Fantasy points generated by runs scored.'
      - name: rbi_pts
        description: 'Fantasy points generated by RBIs.'
      - name: sb_pts
        description: 'Fantasy points generated by stolen bases.'
      - name: cs_pts
        description: 'Fantasy points generated by caught stealing (often negative).'
      - name: tb_pts
        description: 'Fantasy points generated by total bases.'
      - name: singles_pts
        description: 'Fantasy points generated by singles.'
      - name: doubles_pts
        description: 'Fantasy points generated by doubles.'
      - name: triples_pts
        description: 'Fantasy points generated by triples.'
      - name: xbh_pts
        description: 'Fantasy points generated by extra-base hits.'
      - name: w_pts
        description: 'Fantasy points generated by pitcher wins.'
      - name: l_pts
        description: 'Fantasy points generated by pitcher losses (often negative).'
      - name: k_pts
        description: 'Fantasy points generated by pitcher strikeouts.'
      - name: er_pts
        description: 'Fantasy points generated by earned runs allowed (typically negative).'
      - name: outs_pts
        description: 'Fantasy points generated by outs recorded.'
      - name: qs_pts
        description: 'Fantasy points generated by quality starts.'
      - name: sv_pts
        description: 'Fantasy points generated by saves.'
      - name: hld_pts
        description: 'Fantasy points generated by holds.'
      - name: p_h_pts
        description: 'Fantasy points generated by hits allowed (typically negative).'
      - name: p_bb_pts
        description: 'Fantasy points generated by walks allowed (typically negative).'
      - name: p_hr_pts
        description: 'Fantasy points generated by home runs allowed (typically negative).'
      - name: p_r_pts
        description: 'Fantasy points generated by runs allowed (typically negative).'
      - name: cg_pts
        description: 'Fantasy points generated by complete games.'
      - name: blk_pts
        description: 'Fantasy points generated by balks (typically negative).'
      - name: wp_pts
        description: 'Fantasy points generated by wild pitches (typically negative).'

      # Phase 3.2: calculated scoring totals (current season weights applied)
      - name: calculated_hitting_pts
        description: 'Sum of all hitting *_pts columns. What this player''s hitting line scores under current rules.'
      - name: calculated_pitching_pts
        description: 'Sum of all pitching *_pts columns. What this player''s pitching line scores under current rules.'
      - name: calculated_points
        description: 'Sum of all *_pts columns. What this player''s full stat line scores under current rules. For the current season this should closely match total_points; for historical seasons it normalizes to a common scale.'

  - name: fct_weekly_team_performance
    description: >
      Wide-format team-weekly convergence fact. Phase 3.1 absorbed the
      responsibilities of the deleted fct_weekly_team_scores (counting
      stats, rate stats, scoring totals, opponent context, W/L,
      days_in_period). Phase 3.2 added per-stat *_pts columns and
      calculated_* totals rolled up from fct_weekly_player_performance.
      Rolls up from fct_weekly_player_performance (consistency-by-construction:
      team_total = SUM(players)). Recomputes rates via shared macros from
      team-level counting sums. Adds matchup pairings from raw box scores
      and joins matchup_schedule for days_in_period metadata.
      Incremental fact -- merge by unique_key.
      Grain: (season_year, matchup_period, team_id).
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - season_year
              - matchup_period
              - team_id
    columns:
      - name: season_year
        description: 'ESPN season year.'
        tests:
          - not_null
      - name: matchup_period
        description: 'ESPN matchup period number.'
        tests:
          - not_null
      - name: team_id
        description: 'ESPN stable numeric team identifier.'
        tests:
          - not_null
      - name: team_name
        description: 'ESPN fantasy team name.'
      - name: owner_name
        description: 'Team owner display name.'
      - name: h
        description: 'Team hits.'
      - name: ab
        description: 'Team at bats.'
      - name: b_bb
        description: 'Team batter walks.'
      - name: b_so
        description: 'Team batter strikeouts.'
      - name: hbp
        description: 'Team hit by pitch.'
      - name: sf
        description: 'Team sacrifice flies.'
      - name: hr
        description: 'Team home runs.'
      - name: r
        description: 'Team runs.'
      - name: rbi
        description: 'Team runs batted in.'
      - name: sb
        description: 'Team stolen bases.'
      - name: cs
        description: 'Team caught stealing.'
      - name: tb
        description: 'Team total bases.'
      - name: singles
        description: 'Team singles.'
      - name: doubles
        description: 'Team doubles.'
      - name: triples
        description: 'Team triples.'
      - name: xbh
        description: 'Team extra-base hits.'
      - name: w
        description: 'Team pitcher wins.'
      - name: l
        description: 'Team pitcher losses.'
      - name: k
        description: 'Team pitcher strikeouts.'
      - name: er
        description: 'Team earned runs allowed.'
      - name: outs
        description: 'Team outs recorded.'
      - name: qs
        description: 'Team quality starts.'
      - name: sv
        description: 'Team saves.'
      - name: hld
        description: 'Team holds.'
      - name: p_h
        description: 'Team hits allowed.'
      - name: p_bb
        description: 'Team walks allowed.'
      - name: p_hr
        description: 'Team home runs allowed.'
      - name: p_r
        description: 'Team runs allowed.'
      - name: cg
        description: 'Team complete games.'
      - name: blk
        description: 'Team balks.'
      - name: wp
        description: 'Team wild pitches.'
      - name: avg
        description: 'Team batting average (SUM(H) / SUM(AB)).'
      - name: obp
        description: 'Team on-base percentage.'
      - name: slg
        description: 'Team slugging percentage.'
      - name: ops
        description: 'Team OPS (OBP + SLG).'
      - name: era
        description: 'Team ERA.'
      - name: whip
        description: 'Team WHIP.'
      - name: k_per_9
        description: 'Team strikeouts per 9 innings.'
      - name: k_per_bb
        description: 'Team strikeout-to-walk ratio.'
      - name: platform_points
        description: 'Team total fantasy points (sum of player platform_points). Used for W/L determination. Renamed from total_points in Phase 3.2.'
        tests:
          - not_null
      - name: platform_hitting_pts
        description: 'Team hitting fantasy points (sum of player platform_hitting_pts). Renamed from hitting_points in Phase 3.2.'
      - name: platform_pitching_pts
        description: 'Team pitching fantasy points (sum of player platform_pitching_pts). Renamed from pitching_points in Phase 3.2.'
      - name: active_player_count
        description: 'Distinct count of players in active lineup slots for this team this matchup.'
      - name: opponent_id
        description: 'ESPN stable numeric team identifier for the opponent.'
      - name: opponent_name
        description: 'ESPN fantasy team name of the opponent.'
      - name: opponent_owner
        description: 'Owner display name of the opponent.'
      - name: opponent_points
        description: 'Opponent total fantasy points for this matchup.'
      - name: result
        description: 'W if team scored more than opponent, L if less, T if tied. Determined by platform_points (the official ESPN arbiter).'
      - name: days_in_period
        description: 'Count of days in the matchup period (from matchup_schedule.end_date - start_date + 1). Normal weeks = 7; opening week and All-Star break are higher.'

      # Phase 3.2: per-stat point contributions (rolled up from player fact)
      - name: h_pts
        description: 'Team total fantasy points generated by hits.'
      - name: ab_pts
        description: 'Team total fantasy points generated by at bats.'
      - name: b_bb_pts
        description: 'Team total fantasy points generated by batter walks.'
      - name: b_so_pts
        description: 'Team total fantasy points generated by batter strikeouts.'
      - name: hbp_pts
        description: 'Team total fantasy points generated by hit-by-pitch.'
      - name: sf_pts
        description: 'Team total fantasy points generated by sacrifice flies.'
      - name: hr_pts
        description: 'Team total fantasy points generated by home runs.'
      - name: r_pts
        description: 'Team total fantasy points generated by runs scored.'
      - name: rbi_pts
        description: 'Team total fantasy points generated by RBIs.'
      - name: sb_pts
        description: 'Team total fantasy points generated by stolen bases.'
      - name: cs_pts
        description: 'Team total fantasy points generated by caught stealing.'
      - name: tb_pts
        description: 'Team total fantasy points generated by total bases.'
      - name: singles_pts
        description: 'Team total fantasy points generated by singles.'
      - name: doubles_pts
        description: 'Team total fantasy points generated by doubles.'
      - name: triples_pts
        description: 'Team total fantasy points generated by triples.'
      - name: xbh_pts
        description: 'Team total fantasy points generated by extra-base hits.'
      - name: w_pts
        description: 'Team total fantasy points generated by pitcher wins.'
      - name: l_pts
        description: 'Team total fantasy points generated by pitcher losses.'
      - name: k_pts
        description: 'Team total fantasy points generated by pitcher strikeouts.'
      - name: er_pts
        description: 'Team total fantasy points generated by earned runs allowed.'
      - name: outs_pts
        description: 'Team total fantasy points generated by outs recorded.'
      - name: qs_pts
        description: 'Team total fantasy points generated by quality starts.'
      - name: sv_pts
        description: 'Team total fantasy points generated by saves.'
      - name: hld_pts
        description: 'Team total fantasy points generated by holds.'
      - name: p_h_pts
        description: 'Team total fantasy points generated by hits allowed.'
      - name: p_bb_pts
        description: 'Team total fantasy points generated by walks allowed.'
      - name: p_hr_pts
        description: 'Team total fantasy points generated by home runs allowed.'
      - name: p_r_pts
        description: 'Team total fantasy points generated by runs allowed.'
      - name: cg_pts
        description: 'Team total fantasy points generated by complete games.'
      - name: blk_pts
        description: 'Team total fantasy points generated by balks.'
      - name: wp_pts
        description: 'Team total fantasy points generated by wild pitches.'

      # Phase 3.2: calculated scoring totals (current season weights applied)
      - name: calculated_hitting_pts
        description: 'Team sum of player calculated_hitting_pts. What the team''s hitting line scores under current rules.'
      - name: calculated_pitching_pts
        description: 'Team sum of player calculated_pitching_pts. What the team''s pitching line scores under current rules.'
      - name: calculated_points
        description: 'Team sum of player calculated_points. What the team''s full stat line scores under current rules. Use this for cross-season comparisons (e.g., what would 2025 teams have scored under 2026 rules?).'

  - name: mart_stat_leaderboard
    description: >
      Top-10 leaderboard across team and player grains, for both stat-level
      (HR, K, RBI, etc.) and score-level (total_points, hitting_points,
      pitching_points) columns. Implementation uses Snowflake UNPIVOT to
      fold wide columns from the convergence facts back into long-format
      (stat_name, stat_value) rows, then ranks uniformly. Snowflake-specific;
      portable rewrite would be UNION ALL per stat column. Excludes abnormal
      matchup periods. Ties broken by recency (newer season, then matchup).
      View materialization (rankings retroactively mutable; incremental
      would be fragile).
      Grain: (entity_grain, stat_name, record_scope, rank), rank 1..10.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - entity_grain
              - stat_name
              - record_scope
              - rank
    columns:
      - name: entity_grain
        description: 'team or player. Determines whether the row is a team-level or player-level record.'
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['team', 'player']
      - name: stat_name
        description: 'Column name being ranked. Includes counting stats (H, AB, HR, K, etc.) and score columns (TOTAL_POINTS, HITTING_POINTS, PITCHING_POINTS).'
        tests:
          - not_null
      - name: record_scope
        description: 'all_time (across every loaded season) or current_season (latest season only).'
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['all_time', 'current_season']
      - name: rank
        description: '1 to 10. Ties broken by recency (newer season_year, then newer matchup_period).'
        tests:
          - not_null
      - name: season_year
        description: 'Season when this rank was set.'
      - name: matchup_period
        description: 'Matchup period when this rank was set.'
      - name: team_id
        description: 'Team identifier of the rank holder.'
      - name: team_name
        description: 'Team name of the rank holder.'
      - name: owner_name
        description: 'Owner of the team holding this rank.'
      - name: player_id
        description: 'Player identifier (entity_grain = player only; NULL for team rows).'
      - name: player_name
        description: 'Player name (entity_grain = player only; NULL for team rows).'
      - name: display_name
        description: 'Player display name (entity_grain = player only; NULL for team rows).'
      - name: stat_value
        description: 'Numeric value at this rank.'
        tests:
          - not_null
